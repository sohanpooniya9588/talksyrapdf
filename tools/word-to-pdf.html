<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Word to PDF | Talksyra PDF Studio</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <a href="../index.html" class="brand">Talksyra <span>PDF Studio</span></a>
        <nav>
          <a href="../index.html">Home</a>
          <a href="../index.html#tools">All Tools</a>
        </nav>
      </div>
    </header>

    <main class="container tool-page">
      <a class="back-link" href="../index.html">← Back to All Tools</a>
      <h1>Word to PDF</h1>
      <p>Convert DOCX and DOC files into clean PDF documents.</p>

      <section class="tool-panel">
        <form data-tool="word-to-pdf">
          <label class="upload-box">
            <span class="upload-title">Drop Word file here</span>
            <span class="upload-subtitle">Click to browse your DOC/DOCX file</span>
            <input type="file" accept=".doc,.docx,.rtf" />
          </label>
          <div class="selected-file-name">No file selected</div>
          <button type="submit">Convert to PDF</button>
        </form>
        <div class="status"></div>
      </section>
    </main>

    <script src="../script.js"></script>
  </body>
</html>

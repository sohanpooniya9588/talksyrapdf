    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image to PDF - Free JPG to PDF Converter | Talksyra PDF Studio</title>
    <meta name="description" content="Convert JPG or PNG images into one PDF file with our 100% free and easy Image to PDF tool." />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <a href="../index.html" class="brand">Talksyra <span>PDF Studio</span></a>
        <nav>
          <a href="../index.html">Home</a>
          <a href="../index.html#tools">All Tools</a>
        </nav>
      </div>
    </header>

    <main class="container tool-page">
      <a class="back-link" href="../index.html">← Back to All Tools</a>
      <h1>Image to PDF</h1>
      <p>100% free and easy Image to PDF tool. Create one PDF from your JPG, PNG, and other image files.</p>

      <section class="tool-panel">
        <form data-tool="image-to-pdf">
          <label class="upload-box">
            <span class="upload-title">Drop images here</span>
            <span class="upload-subtitle">Click to choose JPG/PNG images</span>
            <input type="file" multiple accept="image/*" />
          </label>
          <div class="selected-file-name">No file selected</div>
          <label>
            Page size
            <select>
              <option>A4</option>
              <option>Letter</option>
              <option>Auto</option>
            </select>
          </label>
          <button type="submit">Create PDF</button>
        </form>
        <div class="status"></div>
        <div class="tool-actions">
          <button type="button" class="download-result-btn" hidden>Download Result</button>
          <button type="button" class="reset-result-btn">Reset</button>
        </div>
      </section>
    </main>

    <script src="../script.js"></script>
  </body>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Frequency Converter: gigahertz to kilohertz | Talksyra PDF Studio</title>
    <meta name="description" content="Convert gigahertz values into kilohertz with a clean online utility workflow." />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <a href="../index.html" class="brand">Talksyra <span>PDF Studio</span></a>
        <nav>
          <a href="../index.html">Home</a>
          <a href="../index.html#tools">All Tools</a>
        </nav>
      </div>
    </header>

    <main class="container tool-page">
      <a class="back-link" href="../index.html">← Back to All Tools</a>
      <h1>Frequency Converter: gigahertz to kilohertz</h1>
      <p>Convert gigahertz values into kilohertz with a clean online utility workflow.</p>

      <section class="tool-panel">
        <form data-tool="calculator" data-calc="frequency-convert">
          <label><span>Amount</span><input type="number" name="amount" step="any" /></label>
<label><span>From unit</span><select name="fromUnit"><option value="hz">hertz</option><option value="khz">kilohertz</option><option value="mhz">megahertz</option><option value="ghz">gigahertz</option><option value="rpm">RPM</option></select></label>
<label><span>To unit</span><select name="toUnit"><option value="hz">hertz</option><option value="khz">kilohertz</option><option value="mhz">megahertz</option><option value="ghz">gigahertz</option><option value="rpm">RPM</option></select></label>
          <button type="submit">Calculate</button>
        </form>
        <div class="status"></div>
        <div class="result-box" hidden></div>
      </section>
    </main>

    <script src="../script.js"></script>
  </body>
</html>

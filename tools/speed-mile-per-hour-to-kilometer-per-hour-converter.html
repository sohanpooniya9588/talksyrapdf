<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speed Converter: mile per hour to kilometer per hour | Talksyra PDF Studio</title>
    <meta name="description" content="Convert mile per hour values into kilometer per hour with a clean online utility workflow." />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <a href="../index.html" class="brand">Talksyra <span>PDF Studio</span></a>
        <nav>
          <a href="../index.html">Home</a>
          <a href="../index.html#tools">All Tools</a>
        </nav>
      </div>
    </header>

    <main class="container tool-page">
      <a class="back-link" href="../index.html">← Back to All Tools</a>
      <h1>Speed Converter: mile per hour to kilometer per hour</h1>
      <p>Convert mile per hour values into kilometer per hour with a clean online utility workflow.</p>

      <section class="tool-panel">
        <form data-tool="calculator" data-calc="speed-unit-convert">
          <label><span>Amount</span><input type="number" name="amount" step="any" /></label>
<label><span>From unit</span><select name="fromUnit"><option value="mps">meter per second</option><option value="kmh">kilometer per hour</option><option value="mph">mile per hour</option><option value="knot">knot</option><option value="ftps">foot per second</option><option value="cmps">centimeter per second</option></select></label>
<label><span>To unit</span><select name="toUnit"><option value="mps">meter per second</option><option value="kmh">kilometer per hour</option><option value="mph">mile per hour</option><option value="knot">knot</option><option value="ftps">foot per second</option><option value="cmps">centimeter per second</option></select></label>
          <button type="submit">Calculate</button>
        </form>
        <div class="status"></div>
        <div class="result-box" hidden></div>
      </section>
    </main>

    <script src="../script.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rotate PDF - Free PDF Rotator | Talksyra PDF Studio</title>
    <meta name="description" content="Rotate PDF pages easily with our 100% free and easy Rotate PDF tool for print-ready files." />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <a href="../index.html" class="brand">Talksyra <span>PDF Studio</span></a>
        <nav>
          <a href="../index.html">Home</a>
          <a href="../index.html#tools">All Tools</a>
        </nav>
      </div>
    </header>

    <main class="container tool-page">
      <a class="back-link" href="../index.html">← Back to All Tools</a>
      <h1>Rotate PDF</h1>
      <p>100% free and easy Rotate PDF tool. Turn pages into the right orientation in a single step.</p>

      <section class="tool-panel">
        <form data-tool="rotate">
          <label class="upload-box">
            <span class="upload-title">Drop PDF here</span>
            <span class="upload-subtitle">Click to browse your file</span>
            <input type="file" accept=".pdf" />
          </label>
          <div class="selected-file-name">No file selected</div>
          <label>
            Rotation angle
            <select>
              <option>90° clockwise</option>
              <option>180°</option>
              <option>90° anticlockwise</option>
            </select>
          </label>
          <button type="submit">Rotate PDF</button>
        </form>
        <div class="status"></div>
        <div class="tool-actions">
          <button type="button" class="download-result-btn" hidden>Download Result</button>
          <button type="button" class="reset-result-btn">Reset</button>
        </div>
      </section>
    </main>

    <script src="../script.js"></script>
  </body>
</html>

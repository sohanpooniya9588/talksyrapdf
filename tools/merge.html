<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merge PDF | Talksyra PDF Studio</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <a href="../index.html" class="brand">Talksyra <span>PDF Studio</span></a>
        <nav>
          <a href="../index.html">Home</a>
          <a href="../index.html#tools">All Tools</a>
        </nav>
      </div>
    </header>

    <main class="container tool-page">
      <a class="back-link" href="../index.html">← Back to All Tools</a>
      <h1>Merge PDF</h1>
      <p>Combine multiple PDF files into one single document.</p>

      <section class="tool-panel">
        <form data-tool="merge">
          <label class="upload-box">
            <span class="upload-title">Drop PDF files here</span>
            <span class="upload-subtitle">Click to choose multiple PDF files</span>
            <input type="file" multiple accept=".pdf" />
          </label>
          <div class="selected-file-name">No file selected</div>
          <label>
            Output name
            <input type="text" placeholder="merged-document.pdf" />
          </label>
          <button type="submit">Merge Files</button>
        </form>
        <div class="status"></div>
      </section>
    </main>

    <script src="../script.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Savings Goal Calculator | Talksyra PDF Studio</title>
    <meta name="description" content="Estimate monthly savings needed to reach a target amount." />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <a href="../index.html" class="brand">Talksyra <span>PDF Studio</span></a>
        <nav>
          <a href="../index.html">Home</a>
          <a href="../index.html#tools">All Tools</a>
        </nav>
      </div>
    </header>

    <main class="container tool-page">
      <a class="back-link" href="../index.html">← Back to All Tools</a>
      <h1>Savings Goal Calculator</h1>
      <p>Estimate monthly savings needed to reach a target amount.</p>

      <section class="tool-panel">
        <form data-tool="calculator" data-calc="savings-goal">
          <label><span>Goal amount</span><input type="number" name="goal" step="any" /></label>
<label><span>Months</span><input type="number" name="months" step="any" /></label>
          <button type="submit">Calculate</button>
        </form>
        <div class="status"></div>
        <div class="result-box" hidden></div>
      </section>
    </main>

    <script src="../script.js"></script>
  </body>
</html>

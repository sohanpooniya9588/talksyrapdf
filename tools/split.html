<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Split PDF | Talksyra PDF Studio</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <a href="../index.html" class="brand">Talksyra <span>PDF Studio</span></a>
        <nav>
          <a href="../index.html">Home</a>
          <a href="../index.html#tools">All Tools</a>
        </nav>
      </div>
    </header>

    <main class="container tool-page">
      <a class="back-link" href="../index.html">← Back to All Tools</a>
      <h1>Split PDF</h1>
      <p>Separate one PDF into chunks, ranges, or individual pages.</p>

      <section class="tool-panel">
        <form>
          <label>
            Upload PDF
            <input type="file" accept=".pdf" />
          </label>
          <label>
            Split mode
            <select>
              <option>By page range</option>
              <option>Every page into separate file</option>
              <option>Custom page numbers</option>
            </select>
          </label>
          <label>
            Page range
            <textarea placeholder="Example: 1-3, 5, 8-10"></textarea>
          </label>
          <button type="submit">Split PDF</button>
        </form>
        <div class="status"></div>
      </section>
    </main>

    <script src="../script.js"></script>
  </body>
</html>

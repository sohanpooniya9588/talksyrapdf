    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Split PDF - Free PDF Splitter | Talksyra PDF Studio</title>
    <meta name="description" content="Split PDF files into separate pages or ranges with our 100% free and easy PDF splitter tool." />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <a href="../index.html" class="brand">Talksyra <span>PDF Studio</span></a>
        <nav>
          <a href="../index.html">Home</a>
          <a href="../index.html#tools">All Tools</a>
        </nav>
      </div>
    </header>

    <main class="container tool-page">
      <a class="back-link" href="../index.html">← Back to All Tools</a>
      <h1>Split PDF</h1>
      <p>100% free and easy Split PDF tool. Separate one PDF into pages, ranges, or smaller files in a few clicks.</p>

      <section class="tool-panel">
        <form data-tool="split">
          <label class="upload-box">
            <span class="upload-title">Drop PDF here</span>
            <span class="upload-subtitle">Click to browse your file</span>
            <input type="file" accept=".pdf" />
          </label>
          <div class="selected-file-name">No file selected</div>
          <label>
            Split mode
            <select>
              <option>By page range</option>
              <option>Every page into separate file</option>
              <option>Custom page numbers</option>
            </select>
          </label>
          <label>
            Page range
            <textarea placeholder="Example: 1-3, 5, 8-10"></textarea>
          </label>
          <button type="submit">Split PDF</button>
        </form>
        <div class="status"></div>
        <div class="tool-actions">
          <button type="button" class="download-result-btn" hidden>Download Result</button>
          <button type="button" class="reset-result-btn">Reset</button>
        </div>
      </section>
    </main>

    <script src="../script.js"></script>
  </body>
</html>

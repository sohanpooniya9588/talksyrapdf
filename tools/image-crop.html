    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Crop | Talksyra PDF Studio</title>
    <meta name="description" content="Crop image files into a focused preview area for web, product, or document use." />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <a href="../index.html" class="brand">Talksyra <span>PDF Studio</span></a>
        <nav>
          <a href="../index.html">Home</a>
          <a href="../index.html#tools">All Tools</a>
        </nav>
      </div>
    </header>

    <main class="container tool-page">
      <a class="back-link" href="../index.html">← Back to All Tools</a>
      <h1>Image Crop</h1>
      <p>Crop image files into a focused preview area for web, product, or document use.</p>

      <section class="tool-panel">
        <form data-tool="image-crop" data-target="image-crop">
          <label class="upload-box">
            <span class="upload-title">Drop your file here</span>
            <span class="upload-subtitle">Click to choose your image/* file</span>
            <input type="file" accept="image/*" />
          </label>
          <div class="selected-file-name">No file selected</div>
          
          <label>
            Crop mode
            <select>
              <option value="center">Center crop</option><option value="square">Square crop</option><option value="portrait">Portrait crop</option>
            </select>
          </label>
          <button type="submit">Crop Image</button>
        </form>
        <div class="status"></div>
        <div class="tool-actions">
          <button type="button" class="download-result-btn" hidden>Download Result</button>
          <button type="button" class="reset-result-btn">Reset</button>
        </div>
      </section>
    </main>

    <script src="../script.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF to Word | Talksyra PDF Studio</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <a href="../index.html" class="brand">Talksyra <span>PDF Studio</span></a>
        <nav>
          <a href="../index.html">Home</a>
          <a href="../index.html#tools">All Tools</a>
        </nav>
      </div>
    </header>

    <main class="container tool-page">
      <a class="back-link" href="../index.html">← Back to All Tools</a>
      <h1>PDF to Word</h1>
      <p>Convert PDF documents into DOCX files for easy editing.</p>

      <section class="tool-panel">
        <form data-tool="pdf-to-word">
          <label class="upload-box">
            <span class="upload-title">Drop PDF here</span>
            <span class="upload-subtitle">Click to browse your file</span>
            <input type="file" accept=".pdf" />
          </label>
          <div class="selected-file-name">No file selected</div>
          <button type="submit">Convert to Word</button>
        </form>
        <div class="status"></div>
        <div class="tool-actions">
          <button type="button" class="download-result-btn" hidden>Download Result</button>
          <button type="button" class="reset-result-btn">Reset</button>
        </div>
      </section>
    </main>

    <script src="../script.js"></script>
  </body>
</html>
